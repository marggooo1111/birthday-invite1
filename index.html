<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение на ДР</title>
<style>
body{font-family:Arial,sans-serif;text-align:center;background:#f0f8ff;margin:0;padding-top:40px}
#welcome-screen{position:fixed;inset:0;background:#ffe4e1;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000}
#name-input{padding:10px;font-size:18px}
.btn{padding:12px 25px;border:none;border-radius:20px;cursor:pointer;font-size:18px}
#enter-btn{background:#ff69b4;color:white}
#yes-btn{background:#2ecc71;color:white}
#no-btn{background:#ff4d4d;color:white;position:absolute}
.buttons-container{position:relative;height:120px}
</style>
</head>
<body>
<div id="welcome-screen">
<h2>Представьтесь, пожалуйста 😊</h2>
<input id="name-input" type="text" placeholder="Ваше имя">
<br><br>
<button class="btn" id="enter-btn">Войти</button>
</div>
<h1 id="question">Сегодня лучший день! 🎉</h1>
<div class="buttons-container">
<button class="btn" id="yes-btn">Да! 😍</button>
<button class="btn" id="no-btn">Нет 😢</button>
</div>
<script>
const yesBtn=document.getElementById('yes-btn');
const noBtn=document.getElementById('no-btn');
const question=document.getElementById('question');
const welcomeScreen=document.getElementById('welcome-screen');
const nameInput=document.getElementById('name-input');
const enterBtn=document.getElementById('enter-btn');
let guestName='';

enterBtn.addEventListener('click', function(){
    guestName=nameInput.value.trim();
    if(!guestName){
        alert('Введите имя');
        return;
    }
    question.textContent=guestName + ', Сегодня лучший день! 🎉';
    welcomeScreen.style.display='none';
    noBtn.style.left='220px';
    noBtn.style.top='0px';
});

nameInput.addEventListener('keydown', function(e){
    if(e.key==='Enter') enterBtn.click();
});

function runAway(){
    const x=Math.random()*(window.innerWidth-120);
    const y=Math.random()*(window.innerHeight-60);
    noBtn.style.left=x+'px';
    noBtn.style.top=y+'px';
}
noBtn.addEventListener('mouseover', runAway);

yesBtn.addEventListener('click', function(){
document.body.innerHTML = `
<h1>Помоги медвежонку собрать 10 пирожков! 🐻🥧</h1>
<div id="score" style="font-size:24px;margin-bottom:10px;">
Собрано: 0 / 10
</div>
<div id="game" style="
position:relative;
width:100%;
height:500px;
background:#dff6d8;
overflow:hidden;
border-top:3px solid #555;
">
<div id="bear" style="
position:absolute;
bottom:20px;
left:50%;
font-size:60px;
user-select:none;
">
🐻
</div>
</div>
<div style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
">
<button id="leftBtn" style="font-size:40px;padding:10px 20px;">⬅️</button>
<button id="rightBtn" style="font-size:40px;padding:10px 20px;">➡️</button>
</div>
`;

const game = document.getElementById("game");
const bear = document.getElementById("bear");
const scoreText = document.getElementById("score");
let bearX = window.innerWidth / 2;
let score = 0;

function updateBear(){
    if(bearX < 0){
        bearX = 0;
    }
    if(bearX > window.innerWidth - 100){
        bearX = window.innerWidth - 100;
    }
    bear.style.left = bearX + "px";
}

document.addEventListener("keydown", function(e){
    if(e.key === "ArrowLeft"){
        bearX -= 25;
    }
    if(e.key === "ArrowRight"){
        bearX += 25;
    }
    updateBear();
});

document.getElementById("leftBtn").addEventListener("click", function(){
    bearX -= 25;
    updateBear();
});
document.getElementById("rightBtn").addEventListener("click", function(){
    bearX += 25;
    updateBear();
});

function createPie(){
    const pie = document.createElement("div");
    pie.innerHTML = "🥧";
    pie.style.position = "absolute";
    pie.style.fontSize = "40px";
    let x = Math.random() * (window.innerWidth - 80);
    let y = -50;
    pie.style.left = x + "px";
    pie.style.top = y + "px";
    game.appendChild(pie);
    
    const fall = setInterval(function(){
        y += 4;
        pie.style.top = y + "px";
        const bearRect = bear.getBoundingClientRect();
        const pieRect = pie.getBoundingClientRect();
        if(
            pieRect.bottom > bearRect.top &&
            pieRect.left < bearRect.right &&
            pieRect.right > bearRect.left
        ){
            score++;
            scoreText.textContent = "Собрано: " + score + " / 10";
            pie.remove();
            clearInterval(fall);
            
            if(score >= 10){
                clearInterval(spawn);
                document.body.innerHTML = `
                    <h1>🎉 Поздравляем!</h1>
                    <h2>Медвежонок собрал все пирожки! 🐻🥧</h2>
                    <img src="https://i.ibb.co/NnjZr5nD/4500a502-9d6f-4aed-9f8e-b2f22296048d.jpg" style="width:500px;max-width:90%;border-radius:20px;">
                    <h2>Ты получишь много подарков!!</h2>
                `;
            }
        }
        if(y > 600){
            pie.remove();
            clearInterval(fall);
        }
    },20);
}
const spawn = setInterval(createPie,1000);
});
</script>
</body>
</html>
